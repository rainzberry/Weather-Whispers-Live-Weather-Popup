<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Whispers</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <!-- ═══ LANDING ═══ -->
  <section class="hero" id="hero">
    <div class="hero-inner">
      <p class="hero-eyebrow">Your gentle sky companion</p>
      <h1 class="hero-title">Weather<br><em>Whispers</em></h1>
      <p class="hero-desc">Soft, honest forecasts for every corner of India.</p>
      <button class="primary-btn" onclick="revealApp()">
        Check the sky <span class="btn-arrow">&#8594;</span>
      </button>
    </div>

    <div class="hero-widget">
      <div class="widget-card">
        <div class="widget-cloud">
          <svg width="64" height="48" viewBox="0 0 64 48" fill="none">
            <circle cx="22" cy="22" r="14" fill="#fde68a" opacity="0.9"/>
            <ellipse cx="18" cy="34" rx="15" ry="10" fill="white" opacity="0.85"/>
            <ellipse cx="34" cy="37" rx="18" ry="11" fill="white"/>
          </svg>
        </div>
        <div class="widget-temp">—°</div>
        <div class="widget-label">Pick a city to begin</div>
      </div>
    </div>
  </section>

  <!-- ═══ APP SCREEN ═══ -->
  <section class="app-screen" id="appScreen">

    <nav class="app-nav">
      <button class="nav-back" onclick="goBack()">&#8592; Back</button>
      <span class="nav-brand">Weather Whispers</span>
    </nav>

    <div class="app-layout">

      <!-- LEFT: City Picker -->
      <aside class="panel left-panel">
        <h2 class="panel-heading">Where are you?</h2>

        <input
          type="text"
          id="searchInput"
          class="field-input"
          placeholder="Search cities..."
          oninput="filterCities()"
          autocomplete="off"
        />

        <div class="city-list" id="cityList"></div>

        <div class="or-row"><span>or enter any city</span></div>

        <input
          type="text"
          id="customCity"
          class="field-input"
          placeholder="e.g. Coimbatore, Mysore..."
          autocomplete="off"
        />

        <button class="primary-btn full" id="submitBtn" onclick="fetchWeather()">
          Get forecast <span class="btn-arrow">&#8594;</span>
        </button>
      </aside>

      <!-- RIGHT: Result -->
      <main class="panel right-panel" id="rightPanel">

        <!-- Idle -->
        <div class="state-idle" id="stateIdle">
          <div class="idle-cloud">
            <svg width="80" height="64" viewBox="0 0 80 64" fill="none">
              <circle cx="28" cy="28" r="18" fill="#fde68a" opacity="0.7"/>
              <ellipse cx="22" cy="44" rx="20" ry="13" fill="#bfdbfe" opacity="0.6"/>
              <ellipse cx="44" cy="48" rx="24" ry="14" fill="#e9d5ff" opacity="0.8"/>
            </svg>
          </div>
          <p class="idle-hint">Select a city on the left<br>to see the forecast</p>
        </div>

        <!-- Loading -->
        <div class="state-loading" id="stateLoading" style="display:none;">
          <div class="loader-ring"></div>
          <p class="loader-hint">Asking the clouds...</p>
        </div>

        <!-- Weather Card -->
        <div class="weather-card" id="weatherCard" style="display:none;">

          <div class="wc-header">
            <div>
              <div class="wc-city" id="wcCity">—</div>
              <div class="wc-desc" id="wcDesc">—</div>
            </div>
            <div class="wc-badge" id="wcBadge">—</div>
          </div>

          <div class="wc-main">
            <div class="wc-icon" id="wcIcon"></div>
            <div class="wc-temp" id="wcTemp">—</div>
          </div>

          <div class="wc-stats">
            <div class="stat">
              <span class="stat-label">Feels like</span>
              <span class="stat-val" id="wcFeels">—</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat">
              <span class="stat-label">Humidity</span>
              <span class="stat-val" id="wcHumidity">—</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat">
              <span class="stat-label">Wind</span>
              <span class="stat-val" id="wcWind">—</span>
            </div>
          </div>

          <div class="wc-note" id="wcNote">—</div>

        </div>

        <!-- Error -->
        <div class="state-error" id="stateError" style="display:none;">
          <p class="error-msg" id="errorMsg">—</p>
        </div>

      </main>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
